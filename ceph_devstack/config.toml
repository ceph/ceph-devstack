stack = "teuthology"
data_dir = "~/.local/share/ceph-devstack"

[stacks.teuthology]
services = [
    "postgres",
    "paddles",
    "beanstalk",
    "pulpito",
    "teuthology",
    "testnode",
    "archive",
]
secrets = ["ssh_keypair"]

[stacks.ceph]
services = ["ceph_node"]
secrets = []
data_dir = "~/.local/share/ceph-devstack/ceph"

[containers.ceph_node]
image = "quay.io/ceph-ci/ceph:main"
loop_device_count = 3
loop_device_size = "5G"
dashboard_port = 8080
dashboard_ssl = false
# dashboard_user = "admin"
# dashboard_password = "admin"
# dashboard = false                  # disable mgr dashboard
# image_builder = "cpatch"         # default; patch local binaries into runtime image
# image_builder = "container"      # future: container/build.sh + local packages
# Build from a local ceph.git checkout:
# repo = "~/dev/ceph"
# build_dir = "build"              # relative to repo; passed to build-with-container.py -b
# build_distro = "centos9"         # build-with-container.py -d
# build_steps = ["build"]          # default for cpatch; ["packages"] for container builder
# sccache = true                   # default; local disk cache (see sccache.conf)
# sccache = false                  # disable sccache
# sccache_mode = "local"           # local (default) or s3 for shared remote cache
# sccache_cache_path = "~/.local/share/ceph-devstack/cache/sccache"
# sccache_cache_size = "100G"      # local cache size limit
# sccache_debug = false              # enable SCCACHE_LOG=debug on build stdout
# sccache_conf = "/path/to/sccache.conf"  # override bundled config entirely
# npm_cache = true                   # default; persist dashboard npm downloads
# npm_cache_path = "~/.local/share/ceph-devstack/cache/npm"  # override npm cache location
# dnf_cache = false                  # persist dnf downloads when rebuilding ceph-build images
# dnf_cache_path = "~/.local/share/ceph-devstack/cache/dnf"  # override dnf cache base dir
# repo may be a git worktree; ceph-devstack mounts git metadata for builds at /ceph
# base_image = "quay.io/ceph-ci/ceph:main"
# image = "localhost/ceph-devstack:main"

[containers.archive]
image = "python:alpine"

[containers.beanstalk]
image = "quay.io/ceph-infra/teuthology-beanstalkd:main"

[containers.paddles]
image = "quay.io/ceph-infra/paddles:main"

[containers.postgres]
image = "quay.io/ceph-infra/teuthology-postgresql:latest"

[containers.pulpito]
image = "quay.io/ceph-infra/pulpito:main"

[containers.testnode]
count = 3
loop_device_size = "5G"
image = "quay.io/ceph-infra/teuthology-testnode:main"

[containers.teuthology]
image = "quay.io/ceph-infra/teuthology-dev:main"
