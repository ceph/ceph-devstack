stack = "teuthology"
data_dir = "~/.local/share/ceph-devstack"

[block_pool]
state_dir = "~/.local/share/ceph-devstack"
# Dedicated empty block device or partition. Whole disks are allowed when
# empty; disks with existing partitions must use a partition path instead.
# Enrollment reads/writes the parent directly: your user must be able to
# open the device for read/write (typically membership in the disk group).
# First run requires allow_enroll = true; the tool writes a tail marker and
# refuses non-empty or foreign devices. If block_pool.json is lost but the
# marker remains, delete the state file and start again; the pool reclaims
# the marker automatically.
# parent = "/dev/nvme0n1"
# parent = "/dev/nvme0n1p1"
# allow_enroll = true

[stacks.teuthology]
services = [
    "postgres",
    "paddles",
    "beanstalk",
    "pulpito",
    "teuthology",
    "testnode",
    "archive",
]
secrets = ["ssh_keypair"]

[stacks.ceph]
services = ["ceph_node"]
secrets = []
data_dir = "~/.local/share/ceph-devstack/ceph"

[containers.ceph_node]
image = "quay.io/ceph-ci/ceph:main"
loop_device_count = 3
loop_device_size = "5G"
dashboard_port = 8080
dashboard_ssl = false
# dashboard_user = "admin"
# dashboard_password = "admin"
# dashboard_show_password = false    # log dashboard password on container start
# dashboard = false                  # disable mgr dashboard
# image_builder = "binary-patch"   # default; patch local binaries into runtime image
# image_builder = "package-build"  # future: container/build.sh + local packages
# Build from a local ceph.git checkout:
# repo = "~/dev/ceph"
# build_dir = "build"              # relative to repo; passed to build-with-container.py -b
# build_distro = "centos9"         # build-with-container.py -d
sccache = true                     # local disk cache (see sccache.conf); set to false to disable
sccache_mode = "local"             # local (default) or s3 for shared remote cache
sccache_rw_mode = false            # enable read-write mode (requires AWS_ACCESS_KEY_ID and AWS_SECRET_ACCESS_KEY in environment for S3)
# sccache_cache_path = "~/.local/share/ceph-devstack/cache/sccache"  # override default cache location
sccache_cache_size = "100G"        # local cache size limit
sccache_debug = false              # enable SCCACHE_LOG=debug on build stdout
# sccache_conf = "/path/to/sccache.conf"  # override bundled config entirely
npm_cache = true                   # persist dashboard npm downloads
# npm_cache_path = "~/.local/share/ceph-devstack/cache/npm"  # override npm cache location
# dnf_cache = false                  # persist dnf downloads when rebuilding ceph-build images
# dnf_cache_path = "~/.local/share/ceph-devstack/cache/dnf"  # override dnf cache base dir
# repo may be a git worktree; ceph-devstack mounts git metadata for builds at /ceph
# base_image = "quay.io/ceph-ci/ceph:main"
# image = "localhost/ceph-devstack:main"

[containers.archive]
image = "python:alpine"

[containers.beanstalk]
image = "quay.io/ceph-infra/teuthology-beanstalkd:main"

[containers.paddles]
image = "quay.io/ceph-infra/paddles:main"

[containers.postgres]
image = "quay.io/ceph-infra/teuthology-postgresql:latest"

[containers.pulpito]
image = "quay.io/ceph-infra/pulpito:main"

[containers.testnode]
count = 3
loop_device_count = 1
loop_device_size = "5G"
image = "quay.io/ceph-infra/teuthology-testnode:main"

[containers.teuthology]
image = "quay.io/ceph-infra/teuthology-dev:main"
